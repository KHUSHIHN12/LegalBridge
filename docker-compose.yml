version: '3.9'

services:

  backend:
    build: .
    container_name: legalbridge-backend

    ports:
      - "5000:5000"

    volumes:
      - ./data:/app/data

    restart: always

  frontend:
    build: ./frontend
    container_name: legalbridge-frontend

    ports:
      - "8080:80"

    restart: always

  prometheus:
    image: prom/prometheus
    container_name: prometheus

    ports:
      - "9090:9090"

    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml

    restart: always

  grafana:
    image: grafana/grafana
    container_name: grafana

    ports:
      - "3000:3000"

    restart: always