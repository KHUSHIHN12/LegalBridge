version: '3.9'

services:

  vault:
    image: hashicorp/vault:latest
    container_name: legalbridge-vault

    ports:
      - "8200:8200"

    environment:
      VAULT_DEV_ROOT_TOKEN_ID: legalbridge-root-token
      VAULT_DEV_LISTEN_ADDRESS: 0.0.0.0:8200

    cap_add:
      - IPC_LOCK

    command: server -dev

    restart: always

  backend:
    build: .
    container_name: legalbridge-backend

    ports:
      - "5000:5000"

    env_file:
      - .env

    environment:
      SECRET_KEY: ${SECRET_KEY}
      JWT_SECRET: ${JWT_SECRET}
      FLASK_ENV: ${FLASK_ENV:-development}
      DEBUG: ${DEBUG:-false}
      MONGODB_URI: ${MONGODB_URI}
      MONGODB_DB_NAME: ${MONGODB_DB_NAME:-legalbridge}
      MONGODB_USERS_COLLECTION: ${MONGODB_USERS_COLLECTION:-users}
      VAULT_ADDR: http://vault:8200
      VAULT_TOKEN: legalbridge-root-token

    depends_on:
      - vault

    volumes:
      - ./data:/app/data

    restart: always

  frontend:
    build: ./frontend
    container_name: legalbridge-frontend

    ports:
      - "8080:80"

    restart: always

  prometheus:
    image: prom/prometheus
    container_name: prometheus

    ports:
      - "9090:9090"

    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml

    restart: always

  grafana:
    image: grafana/grafana
    container_name: grafana

    ports:
      - "3000:3000"

    restart: always
