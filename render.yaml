services:
  - type: web
    name: legalbridge-backend
    runtime: python
    plan: free
    rootDir: .
    buildCommand: pip install -r backend/requirements.txt
    startCommand: gunicorn --chdir backend app:app
    healthCheckPath: /
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: FLASK_ENV
        value: production
      - key: DEBUG
        value: "false"
      - key: SECRET_KEY
        generateValue: true
      - key: JWT_SECRET
        generateValue: true
      - key: MONGODB_URI
        sync: false
      - key: MONGODB_DB_NAME
        value: legalbridge
      - key: MONGODB_USERS_COLLECTION
        value: users
      - key: FRONTEND_ORIGINS
        sync: false

  - type: web
    name: legalbridge-frontend
    runtime: static
    plan: free
    rootDir: .
    buildCommand: |
      printf "window.LEGALBRIDGE_API_BASE_URL = '%s';\n" "$LEGALBRIDGE_API_BASE_URL" > frontend/config.js
    staticPublishPath: frontend
    envVars:
      - key: LEGALBRIDGE_API_BASE_URL
        sync: false
